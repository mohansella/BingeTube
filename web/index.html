<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BingeTube">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png" />

  <title>BingeTube</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #121212;
    }

    #native-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      z-index: 0;
    }

    #native-splash>* {
      width: 32vw;
      max-width: 420px;
      height: auto;
    }
  </style>
</head>

<body>
  <!-- Native splash -->
  <div id="native-splash">
    <lottie-player id="splash-lottie" background="transparent" speed="1" loop autoplay></lottie-player>
  </div>

  <script>
    const baseHref = document.querySelector('base')?.getAttribute('href') || '/';
    document.getElementById('splash-lottie').setAttribute('src', baseHref + 'assets/assets/lottie/binge_panda.json');
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
